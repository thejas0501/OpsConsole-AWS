name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/opsconsole

            # Force-reset any local changes (e.g. .env.local written by previous deploy)
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            git pull origin master

            # Write .env.local with credentials
            printf '%s\n' \
              'PORT=3000' \
              'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}' \
              'AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              'AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}' \
              'NEXT_PUBLIC_AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}' \
              'AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}' \
              'SESSION_SECRET=${{ secrets.SESSION_SECRET }}' \
              > .env.local

            # Install dependencies
            npm install --prefer-offline 2>/dev/null || npm install

            # Production build
            npm run build

            # Restart app — create if process doesn't exist
            pm2 restart opsconsole 2>/dev/null || pm2 start npm --name "opsconsole" -- start
            pm2 save

            echo "Deploy complete"
